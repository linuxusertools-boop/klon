<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEVCODEX | KEVAI</title>
    <style>
        :root {
            --bg-color: #f0eee4; /* Krem Khas Logo */
            --accent-color: #000000;
            --white: #ffffff;
            --border-thick: 6px solid #000000;
            --border-thin: 3px solid #000000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Arial Black', 'Arial Bold', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--accent-color); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            text-transform: uppercase;
            position: relative;
        }


        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.03) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.01));
            z-index: 999;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

    
        .marquee-top {
            background: var(--accent-color);
            color: var(--bg-color);
            padding: 6px 0;
            font-size: 11px;
            overflow: hidden;
            white-space: nowrap;
            border-bottom: var(--border-thin);
            display: flex;
            justify-content: space-between;
        }
        .marquee-content {
            display: inline-block;
            animation: marquee 20s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }


        .header { 
            background-color: var(--bg-color); 
            padding: 15px 20px; 
            display: flex; 
            align-items: center; 
            border-bottom: var(--border-thick);
            z-index: 10;
        }
        
        .avatar-frame {
            width: 60px;
            height: 60px;
            border: var(--border-thin);
            background: var(--white);
            transform: rotate(-2deg);
            box-shadow: 4px 4px 0px var(--accent-color);
        }
        .avatar { width: 100%; height: 100%; object-fit: cover; display: block; }

        .header-info { margin-left: 20px; flex: 1; }
        .header-info h1 { font-size: 26px; letter-spacing: -2px; line-height: 0.9; }
        .status-badge { 
            font-size: 10px; 
            background: var(--accent-color); 
            color: var(--bg-color);
            padding: 2px 8px;
            display: inline-block;
            margin-top: 6px;
        }


        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 25px 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px;
            background: radial-gradient(circle, #dcdbc9 1px, transparent 1px);
            background-size: 25px 25px;
            scroll-behavior: smooth;
        }
        
    
        .message { 
            max-width: 85%; 
            padding: 15px; 
            border: var(--border-thin);
            font-size: 14px; 
            font-weight: 900;
            position: relative;
        }

        .user-msg { 
            align-self: flex-end; 
            background-color: var(--accent-color); 
            color: var(--bg-color);
            box-shadow: 10px 10px 0px rgba(0,0,0,0.15);
        }

        .ai-msg { 
            align-self: flex-start; 
            background-color: var(--white); 
            box-shadow: 10px 10px 0px var(--accent-color);
        }
        
        /* BADGE */
        .msg-badge {
            position: absolute;
            top: -12px;
            left: 10px;
            background: var(--accent-color);
            color: var(--bg-color);
            font-size: 9px;
            padding: 2px 6px;
            border: 1px solid var(--bg-color);
        }
        .user-msg .msg-badge { left: auto; right: 10px; background: var(--white); color: #000; }


        .stc-msg { border: none !important; background: transparent !important; box-shadow: none !important; }
        .stc-wrapper {
            background: var(--white);
            border: var(--border-thin);
            padding: 8px;
            box-shadow: 10px 10px 0px var(--accent-color);
            display: inline-block;
        }
        .whatsapp-sticker { width: 150px; height: 150px; display: block; }
        
        .time { font-size: 9px; margin-top: 10px; display: block; opacity: 0.6; font-family: monospace; }


        .input-area { 
            background-color: var(--accent-color); 
            padding: 20px; 
            display: flex; 
            gap: 15px;
            border-top: var(--border-thick);
        }

        .input-container {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--bg-color);
            border: var(--border-thin);
            padding-left: 15px;
        }

        .prefix { font-weight: 900; margin-right: 10px; }

        input { 
            width: 100%;
            background: transparent; 
            border: none; 
            padding: 15px 0; 
            color: var(--accent-color); 
            outline: none; 
            font-family: inherit;
            font-weight: 900;
            font-size: 16px;
        }

        button { 
            background: var(--bg-color); 
            border: var(--border-thin); 
            padding: 0 30px;
            font-family: inherit;
            font-weight: 900;
            cursor: pointer;
            transition: 0.1s;
        }

        button:hover { background: var(--white); transform: translate(-3px, -3px); box-shadow: 6px 6px 0px #666; }
        button:active { transform: translate(0, 0); box-shadow: none; }

        
        #chat-container::-webkit-scrollbar { width: 14px; border-left: var(--border-thin); }
        #chat-container::-webkit-scrollbar-thumb { background: var(--accent-color); }
    </style>
</head>
<body>

    <div class="marquee-top">
        <div class="marquee-content">
            KEVCODEX SYSTEM v1.0 // STATUS: OPERATIONAL // AUTHOR: KEVIN // MODE: BRUTALIST // NO RULES // SECURITY: STABLE // 
            KEVCODEX SYSTEM v1.0 // STATUS: OPERATIONAL // AUTHOR: KEVIN // MODE: BRUTALIST // NO RULES // SECURITY: STABLE // 
        </div>
        <span id="sys-clock" style="padding: 0 15px; font-weight: bold; background: #000; z-index: 10;">00:00:00</span>
    </div>

    <div class="header">
        <div class="avatar-frame">
            <img src="https://c.termai.cc/i141/WUSOXU.jpg" alt="KEV" class="avatar">
        </div>
        <div class="header-info">
            <h1>KEVCODEX<br>SYSTEM</h1>
            <div class="status-badge">CONNECTED // PORT 443</div>
        </div>
    </div>

    <div id="chat-container">
        </div>

    <div class="input-area">
        <div class="input-container">
            <span class="prefix">></span>
            <input type="text" id="userInput" placeholder="TYPE COMMAND..." autocomplete="off">
        </div>
        <button id="sendBtn">EXECUTE</button>
    </div>

    <script>
    
        function updateClock() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                            now.getMinutes().toString().padStart(2, '0') + ":" + 
                            now.getSeconds().toString().padStart(2, '0');
            document.getElementById('sys-clock').innerText = timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
    <script src="script.js"></script>
</body>
</html>
